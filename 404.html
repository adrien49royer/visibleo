<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Visibleo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bleu:#0F2554;--or:#C9943A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bleu);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.wrap{max-width:480px;}
.logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:32px;}
.logo em{color:var(--or);font-style:normal;}
h1{font-family:'Syne',sans-serif;font-size:80px;font-weight:800;color:var(--or);line-height:1;}
h2{font-family:'Syne',sans-serif;font-size:22px;margin:12px 0 8px;}
p{font-size:15px;color:rgba(255,255,255,.65);margin-bottom:28px;}
a{display:inline-block;padding:12px 28px;background:var(--or);color:var(--bleu);border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-decoration:none;transition:opacity .15s;}
a:hover{opacity:.85;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Visibl<em>eo</em></div>
  <h1>404</h1>
  <h2>Page introuvable</h2>
  <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
  <a href="/">← Retour à l'accueil</a>
</div>
</body>
</html>
